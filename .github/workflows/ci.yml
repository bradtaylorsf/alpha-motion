name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Lint (if configured)
        run: |
          if grep -q "\"lint\"" package.json; then
            pnpm run lint
          else
            echo "No lint script found, skipping"
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm run build:electron

      - name: Verify build artifacts
        run: |
          echo "Checking build output..."
          ls -la dist/
          ls -la electron-dist/

          # Verify critical files exist
          test -f dist/index.html || (echo "Missing dist/index.html" && exit 1)
          test -f electron-dist/main.cjs || (echo "Missing electron-dist/main.cjs" && exit 1)
          test -f electron-dist/preload.cjs || (echo "Missing electron-dist/preload.cjs" && exit 1)

          echo "✅ All build artifacts verified"

  # Optional: Test Electron packaging (without signing)
  test-packaging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools
          pnpm install --frozen-lockfile

      - name: Test Electron packaging (dry run)
        run: |
          pnpm run build:electron
          # Just verify electron-builder config is valid
          npx electron-builder --config electron-builder.config.cjs --linux --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
