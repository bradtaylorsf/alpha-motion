name: Release Electron App

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.gitignore'

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # First, check if we should create a release
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for release trigger
        id: check
        run: |
          # Get version from package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if tag already exists
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            # Check commit message for release trigger or version bump
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if [[ "$COMMIT_MSG" == *"[release]"* ]] || \
               [[ "$COMMIT_MSG" == *"chore(release)"* ]] || \
               [[ "$COMMIT_MSG" == *"bump version"* ]] || \
               [[ "$COMMIT_MSG" == *"release:"* ]]; then
              echo "Release trigger found in commit message"
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "No release trigger found, skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          fi

  # Build for each platform using Electron Forge
  build:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # macOS specific: Rebuild native modules for DMG creation
      - name: Rebuild native modules for DMG
        if: matrix.platform == 'darwin'
        run: |
          pnpm rebuild macos-alias fs-xattr || true

      # Linux specific: Install build dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm

      - name: Build application
        run: pnpm run build:electron

      - name: Make distributables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec electron-forge make --arch=${{ matrix.arch }}

      - name: List output files
        shell: bash
        run: |
          echo "=== Output directory contents ==="
          find out -type f -name "*.*" | head -50 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/*.deb
            out/make/**/*.rpm
          if-no-files-found: warn
          retention-days: 7

  # Create GitHub Release with all artifacts
  release:
    needs: [check-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p final-release

          echo "=== Downloaded artifacts ==="
          find release-artifacts -type f | head -50

          # Copy all distributable files
          find release-artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.exe" -o \
            -name "*.deb" -o \
            -name "*.rpm" \
          \) -exec cp {} final-release/ \;

          echo "=== Final release files ==="
          ls -la final-release/ || echo "No files found"

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${{ needs.check-release.outputs.version }}

          cat << 'EOF' > release_notes.md
          ## Downloads

          ### macOS
          - **Apple Silicon (M1/M2/M3)**: Download the `arm64` DMG or ZIP
          - **Intel**: Download the `x64` DMG or ZIP

          ### Windows
          - **Installer**: Download the `.exe` file
          - **Portable**: Download the Windows ZIP

          ### Linux
          - **Debian/Ubuntu**: Download the `.deb` file
          - **Red Hat/Fedora**: Download the `.rpm` file

          ## What's Changed

          EOF

          # Add recent commits as changelog
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~10)..HEAD >> release_notes.md 2>/dev/null || \
            git log --pretty=format:"- %s" -10 >> release_notes.md

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "*Built with GitHub Actions using Electron Forge*" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-release.outputs.version }}
          name: Answer Motion v${{ needs.check-release.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: final-release/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.check-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for file in final-release/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(du -h "$file" | cut -f1)
              echo "- \`$filename\` ($size)" >> $GITHUB_STEP_SUMMARY
            fi
          done
